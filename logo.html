<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Logo Stone Shatter Animation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Canvas full-screen agar serpihan batu bebas terbang keluar layar */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            z-index: 2;
            transition: filter 0.5s ease;
        }

        /* Efek Kilatan Petir (Flash) saat Logo Mulai Pecah */
        .lightning-flash {
            animation: flashTime 0.35s ease-out forwards;
        }
        @keyframes flashTime {
            0% { background-color: #0a0a0f; }
            15% { background-color: #ffffff; filter: blur(4px); }
            30% { background-color: #d4af37; }
            100% { background-color: #0a0a0f; }
        }

        /* Intense Glow di Akhir Animasi saat Logo Utuh Kembali */
        .canvas-glow {
            filter: drop-shadow(0 0 30px #d4af37) drop-shadow(0 0 60px rgba(212, 175, 55, 0.6));
        }
    </style>
</head>
<body>

    <canvas id="logoCanvas"></canvas>

    <script>
        const canvas = document.getElementById('logoCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // Menyesuaikan ukuran canvas dengan resolusi layar browser
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let particles = [];
        let animationTimeline = 0;
        let currentPhase = 0; // 0: Diam, 1: Shatter, 2: Reverse, 3: Glow
        let logoLoaded = false;
        let logoRect = { x: 0, y: 0, w: 0, h: 0 };

        // Load Aset Gambar Logo
        const logoImg = new Image();
        logoImg.src = './logo.webp'; // Pastikan file logo.webp ada di folder yang sama

        logoImg.onload = function() {
            logoLoaded = true;
            calculateLogoPosition();
            createLogoParticles();
            animate();
        };

        // Penanganan jika gambar logo tidak ditemukan atau gagal di-load
        logoImg.onerror = function() {
            ctx.fillStyle = '#ffffff';
            ctx.font = "16px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("Gagal memuat gambar './logo.webp'. Periksa kembali jalur file Anda.", canvas.width / 2, canvas.height / 2);
        };

        // Menghitung proporsi letak logo di tengah layar tanpa merusak aspek rasio asli
        function calculateLogoPosition() {
            const maxBoundingSize = Math.min(window.innerWidth * 0.8, 380); 
            let scale = Math.min(maxBoundingSize / logoImg.naturalWidth, maxBoundingSize / logoImg.naturalHeight);
            
            logoRect.w = logoImg.naturalWidth * scale;
            logoRect.h = logoImg.naturalHeight * scale;
            logoRect.x = (canvas.width - logoRect.w) / 2;
            logoRect.y = (canvas.height - logoRect.h) / 2;
        }

        // Struktur object cetakan untuk mengontrol setiap bongkahan pecahan batu
        class Fragment {
            constructor(sx, sy, sw, sh, dx, dy, dw, dh) {
                this.sx = sx; this.sy = sy;
                this.sw = sw; this.sh = sh;
                
                this.origX = dx; this.origY = dy;
                this.x = dx; this.y = dy;
                this.dw = dw; this.dh = dh;

                // Kecepatan dorongan ledakan batu (Dibuat bertenaga agar meluncur jauh)
                this.vx = (Math.random() - 0.5) * 24;
                this.vy = (Math.random() - 0.5) * 24 - Math.random() * 8; 
                
                // Efek putaran batu abstrak saat melayang
                this.angle = 0;
                this.va = (Math.random() - 0.5) * 0.25; 

                this.alpha = 1;
                this.burnProgress = 0; 
            }

            // Update gerakan maju (Meledak keluar layar + Menjadi hangus)
            updateShatter() {
                this.x += this.vx;
                this.y += this.vy;
                this.angle += this.va;
                
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.vy += 0.25; // Gravitasi agar serpihan batu perlahan jatuh ke bawah

                // Efek Disintegration (Batu perlahan menggelap menjadi abu)
                this.burnProgress += (1 - this.burnProgress) * 0.03;
                this.alpha -= 0.006;
                if (this.alpha < 0) this.alpha = 0;
            }

            // Update gerakan mundur (Time Reverse kembali menyatu ke tengah)
            updateReverse() {
                this.x += (this.origX - this.x) * 0.08;
                this.y += (this.origY - this.y) * 0.08;
                this.angle += (0 - this.angle) * 0.08;
                
                this.burnProgress += (0 - this.burnProgress) * 0.08;
                this.alpha += (1 - this.alpha) * 0.08;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.dw / 2, this.y + this.dh / 2);
                ctx.rotate(this.angle);
                ctx.globalAlpha = this.alpha;

                // Menggambar potongan tekstur logo asli di bongkahan batu ini
                ctx.drawImage(
                    logoImg, 
                    this.sx, this.sy, this.sw, this.sh, 
                    -this.dw / 2, -this.dh / 2, this.dw, this.dh
                );

                // Lapisan abu gelap di atas batu saat meledak
                if (this.burnProgress > 0) {
                    ctx.fillStyle = `rgba(20, 20, 25, ${this.burnProgress * 0.95})`;
                    ctx.fillRect(-this.dw / 2, -this.dh / 2, this.dw, this.dh);
                }

                ctx.restore();
            }
        }

        // Fungsi membagi (slice) logo menjadi grid bongkahan batu abstrak (100 bagian)
        function createLogoParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(logoImg, logoRect.x, logoRect.y, logoRect.w, logoRect.h);

            // Perbaikan Bug: Memanggil getImageData langsung dari objek ctx asli
            const imgData = ctx.getImageData(logoRect.x, logoRect.y, logoRect.w, logoRect.h);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Sistem Grid 10x10 menghasilkan potongan abstract batu yang pas
            const cols = 10;
            const rows = 10;
            
            const srcBlockW = logoImg.naturalWidth / cols;
            const srcBlockH = logoImg.naturalHeight / rows;
            
            const destBlockW = logoRect.w / cols;
            const destBlockH = logoRect.h / rows;

            particles = [];

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let checkX = Math.floor((c + 0.5) * destBlockW);
                    let checkY = Math.floor((r + 0.5) * destBlockH);
                    let pixelIndex = (checkY * Math.floor(logoRect.w) + checkX) * 4;

                    // Mengabaikan ruang transparan di sekitar logo agar tidak memberatkan RAM
                    if (imgData.data[pixelIndex + 3] > 30) {
                        particles.push(new Fragment(
                            c * srcBlockW, r * srcBlockH, srcBlockW, srcBlockH,
                            logoRect.x + c * destBlockW, logoRect.y + r * destBlockH, destBlockW, destBlockH
                        ));
                    }
                }
            }
        }

        // Engine Utama Loop Animasi
        function animate() {
            if (!logoLoaded) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            animationTimeline++;

            // --- CONTROLLER TIMELINE ANIMASI ---
            if (animationTimeline === 1) {
                currentPhase = 0; // Fase Diam Awal
            } 
            else if (animationTimeline === 75) {
                // PETIR MENYAMBAR! Pecahan batu terlempar masif memenuhi layar
                currentPhase = 1;
                document.body.classList.add('lightning-flash');
                setTimeout(() => document.body.classList.remove('lightning-flash'), 350);
            } 
            else if (animationTimeline === 210) {
                // TIME REVERSE! Batu ditarik balik masuk kembali ke tengah
                currentPhase = 2;
            } 
            else if (animationTimeline === 285) {
                // UTUH SEMPURNA & BERCAHAYA EMAS GLOW
                currentPhase = 3;
                canvas.classList.add('canvas-glow');
            } 
            else if (animationTimeline > 385) {
                // Reset perulangan timeline otomatis
                animationTimeline = 0;
                canvas.classList.remove('canvas-glow');
                createLogoParticles();
            }

            // --- PROSES DRAWING PER FASE ---
            if (currentPhase === 0 || currentPhase === 3) {
                if (currentPhase === 3) {
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = "rgba(212, 175, 55, 0.85)";
                } else {
                    ctx.shadowBlur = 0;
                }
                ctx.drawImage(logoImg, logoRect.x, logoRect.y, logoRect.w, logoRect.h);
            } 
            else {
                ctx.shadowBlur = 0;
                particles.forEach(p => {
                    if (currentPhase === 1) p.updateShatter();
                    if (currentPhase === 2) p.updateReverse();
                    p.draw();
                });
            }

            requestAnimationFrame(animate);
        }

        // Responsif saat window browser di-resize nilainya disesuaikan ulang otomatis
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (logoLoaded) {
                calculateLogoPosition();
                createLogoParticles();
            }
        });
    </script>
</body>
</html>
