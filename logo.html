<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Logo Stone Shatter Animation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Canvas dibuat memenuhi seluruh layar agar pecahan bisa terbang bebas */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            z-index: 2;
            transition: filter 0.5s ease;
        }

        /* Efek Kilatan Petir (Flash) di Seluruh Background Layar */
        .lightning-flash {
            animation: flashTime 0.35s ease-out forwards;
        }
        @keyframes flashTime {
            0% { background-color: #0a0a0f; }
            15% { background-color: #ffffff; filter: blur(4px); }
            30% { background-color: #d4af37; }
            100% { background-color: #0a0a0f; }
        }

        /* Intense Glow di Akhir Animasi */
        .canvas-glow {
            filter: drop-shadow(0 0 30px #d4af37) drop-shadow(0 0 60px rgba(212, 175, 55, 0.6));
        }
    </style>
</head>
<body>

    <canvas id="logoCanvas"></canvas>

    <script>
        const canvas = document.getElementById('logoCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // Fungsi mencocokkan dimensi internal canvas dengan layar browser
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let particles = [];
        let animationTimeline = 0;
        let currentPhase = 0; // 0: Diam, 1: Shatter/Ash, 2: Reverse, 3: Intense Glow
        let logoLoaded = false;

        // Kordinat & Dimensi peletakan logo di tengah layar
        let logoRect = { x: 0, y: 0, w: 0, h: 0 };

        const logoImg = new Image();
        logoImg.src = './logo.webp'; // Membaca file logo asli Anda

        logoImg.onload = function() {
            logoLoaded = true;
            calculateLogoPosition();
            createLogoParticles();
            animate();
        };

        // Menghitung rasio asli gambar agar tidak gepeng/distorsi
        function calculateLogoPosition() {
            // Membatasi ukuran maksimal penampilan logo di layar
            const maxBoundingSize = Math.min(window.innerWidth * 0.8, 380); 
            
            let scale = Math.min(maxBoundingSize / logoImg.naturalWidth, maxBoundingSize / logoImg.naturalHeight);
            
            logoRect.w = logoImg.naturalWidth * scale;
            logoRect.h = logoImg.naturalHeight * scale;
            logoRect.x = (canvas.width - logoRect.w) / 2;
            logoRect.y = (canvas.height - logoRect.h) / 2;
        }

        // Class Fragment untuk mengatur bongkahan batu besar hasil pecahan
        class Fragment {
            constructor(sx, sy, sw, sh, dx, dy, dw, dh) {
                // Simpan data koordinat asal potongan gambar
                this.sx = sx; this.sy = sy;
                this.sw = sw; this.sh = sh;
                
                // Koordinat dinamis dan target reassemble
                this.origX = dx; this.origY = dy;
                this.x = dx; this.y = dy;
                this.dw = dw; this.dh = dh;

                // Set arah ledakan batu yang acak & bertenaga besar keluar layar
                this.vx = (Math.random() - 0.5) * 22;
                this.vy = (Math.random() - 0.5) * 22 - Math.random() * 8; 
                
                // Rotasi/Putaran batu agar terlihat abstrak saat melayang
                this.angle = 0;
                this.va = (Math.random() - 0.5) * 0.25; 

                this.alpha = 1;
                this.burnProgress = 0; // Efek hangus terbakar
            }

            // Fase 1: Meledak & Membumihanguskan (Shatter + Disintegration)
            updateShatter() {
                this.x += this.vx;
                this.y += this.vy;
                this.angle += this.va;
                
                // Hambatan udara dan efek gravitasi jatuh bebas
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.vy += 0.25; 

                // Perubahan abu & memudarkan bongkahan batu
                this.burnProgress += (1 - this.burnProgress) * 0.03;
                this.alpha -= 0.006;
                if (this.alpha < 0) this.alpha = 0;
            }

            // Fase 2: Membalikkan Waktu (Time Reverse Reassemble)
            updateReverse() {
                // Rumus Easing menarik kembali pecahan dari posisi luar layar ke tengah
                this.x += (this.origX - this.x) * 0.08;
                this.y += (this.origY - this.y) * 0.08;
                this.angle += (0 - this.angle) * 0.08;
                
                this.burnProgress += (0 - this.burnProgress) * 0.08;
                this.alpha += (1 - this.alpha) * 0.08;
            }

            draw() {
                ctx.save();
                // Translasi titik pusat ke tengah-tengah pecahan batu untuk efek rotasi
                ctx.translate(this.x + this.dw / 2, this.y + this.dh / 2);
                ctx.rotate(this.angle);
                ctx.globalAlpha = this.alpha;

                // Menggambar pecahan tekstur logo asli di bongkahan batu ini
                ctx.drawImage(
                    logoImg, 
                    this.sx, this.sy, this.sw, this.sh, 
                    -this.dw / 2, -this.dh / 2, this.dw, this.dh
                );

                // Overlay Efek Abu Hangus (Disintegration) di atas permukaan pecahan batu
                if (this.burnProgress > 0) {
                    ctx.fillStyle = `rgba(20, 20, 25, ${this.burnProgress * 0.95})`;
                    ctx.fillRect(-this.dw / 2, -this.dh / 2, this.dw, this.dh);
                }

                ctx.restore();
            }
        }

        // Fungsi membagi (slice) logo menjadi grid pecahan batu besar
        function createLogoParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(logoImg, logoRect.x, logoRect.y, logoRect.w, logoRect.h);

            // Scan alpha untuk menghindari pembuatan objek kosong/transparan
            const imgData = ctx.getContext('2d').getImageData(logoRect.x, logoRect.y, logoRect.w, logoRect.h);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Mengatur pembagian grid (10x10 = 100 Pecahan Batu Besar & Abstrak)
            const cols = 10;
            const rows = 10;
            
            const srcBlockW = logoImg.naturalWidth / cols;
            const srcBlockH = logoImg.naturalHeight / rows;
            
            const destBlockW = logoRect.w / cols;
            const destBlockH = logoRect.h / rows;

            particles = [];

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    // Cari titik tengah blok untuk mengecek apakah ada pixel logo di sana
                    let checkX = Math.floor((c + 0.5) * destBlockW);
                    let checkY = Math.floor((r + 0.5) * destBlockH);
                    let pixelIndex = (checkY * Math.floor(logoRect.w) + checkX) * 4;

                    // Jika area tersebut solid/berwarna (bukan background transparan)
                    if (imgData.data[pixelIndex + 3] > 30) {
                        particles.push(new Fragment(
                            c * srcBlockW, r * srcBlockH, srcBlockW, srcBlockH, // Sisi gambar asli
                            logoRect.x + c * destBlockW, logoRect.y + r * destBlockH, destBlockW, destBlockH // Sisi penempatan layar
                        ));
                    }
                }
            }
        }

        // Loop utama engine animasi
        function animate() {
            if (!logoLoaded) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            animationTimeline++;

            // --- TIMELINE RUNNER ---
            if (animationTimeline === 1) {
                currentPhase = 0; // Tampilan diam di awal
            } 
            else if (animationTimeline === 75) {
                // PETIR MENYAMBAR! Logo hancur lebur memenuhi layar luar
                currentPhase = 1;
                document.body.classList.add('lightning-flash');
                setTimeout(() => document.body.classList.remove('lightning-flash'), 350);
            } 
            else if (animationTimeline === 210) {
                // TIME REVERSE! Menarik kembali bongkahan batu dari luar layar
                currentPhase = 2;
            } 
            else if (animationTimeline === 285) {
                // LOGO KEMBALI UTUH & MEMANCARKAN INTENSE GLOW
                currentPhase = 3;
                canvas.classList.add('canvas-glow');
            } 
            else if (animationTimeline > 385) {
                // Reset loop timeline
                animationTimeline = 0;
                canvas.classList.remove('canvas-glow');
                createLogoParticles();
            }

            // --- PROSES RENDERING FASE ---
            if (currentPhase === 0 || currentPhase === 3) {
                if (currentPhase === 3) {
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = "rgba(212, 175, 55, 0.85)";
                } else {
                    ctx.shadowBlur = 0;
                }
                ctx.drawImage(logoImg, logoRect.x, logoRect.y, logoRect.w, logoRect.h);
            } 
            else {
                ctx.shadowBlur = 0;
                particles.forEach(p => {
                    if (currentPhase === 1) p.updateShatter();
                    if (currentPhase === 2) p.updateReverse();
                    p.draw();
                });
            }

            requestAnimationFrame(animate);
        }

        // Deteksi perubahan ukuran window browser agar posisi logo selalu presisi di tengah
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (logoLoaded) {
                calculateLogoPosition();
                createLogoParticles();
            }
        });
    </script>
</body>
</html>
