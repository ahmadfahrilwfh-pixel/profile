<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Model Realistis - CVC Pique Hexagon</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px; /* Diperlebar dari 900px agar layout lebih luas */
            width: 100%;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* Judul */
        .title-header {
            width: 100%;
            text-align: center;
            margin-bottom: 5px;
            color: #22293B;
        }
        
        .title-header h2 {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
        }
        
        .title-header p {
            margin: 5px 0 15px 0;
            font-size: 16px;
            font-style: italic;
            color: #555;
        }

        /* Disclaimer Area */
        .disclaimer-full {
            width: 100%;
            background-color: #fff3cd;
            color: #856404;
            border-left: 5px solid #ffeeba;
            padding: 15px;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        /* Mockup Area */
        .model-section {
            flex: 1.2; /* Ditambah agar area model mengambil space lebih dominan (Fuller) */
            min-width: 320px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Wrapper Stacking Context */
        .mockup-wrapper {
            position: relative;
            width: 100%;
            max-width: 550px; /* Ditingkatkan dari 400px agar frame tidak sempit */
            aspect-ratio: 3 / 4; /* Menjaga rasio foto model tetap ideal */
            background-color: #eaeaea;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover; /* Memastikan aset gambar memenuhi frame secara penuh */
            background-position: center;
        }

        /* 1. Layer Paling Bawah: Foto Asli Model */
        .layer-base {
            background-image: url('model-base.webp');
            z-index: 1;
        }

        /* 2. Layer Tengah: Warna HTML + Masking */
        .layer-color {
            z-index: 2;
            background-color: #5C2032; /* Default awal mengikuti data pertama (Burgundy) */
            -webkit-mask-image: url('mask.png');
            mask-image: url('mask.png');
            -webkit-mask-size: cover;
            mask-size: cover;
            -webkit-mask-position: center;
            mask-position: center;
            transition: background-color 0.3s ease;
            mix-blend-mode: multiply; 
        }

        /* 3. Layer Atas: Tekstur Kain Grayscale */
        .layer-texture {
            background-image: url('texture-cvc.webp');
            z-index: 3;
            -webkit-mask-image: url('mask.png');
            mask-image: url('mask.png');
            -webkit-mask-size: cover;
            mask-size: cover;
            -webkit-mask-position: center;
            mask-position: center;
            mix-blend-mode: multiply; 
            opacity: 0.85; 
            pointer-events: none; 
            background-repeat: repeat;
            background-size: 30px;
        }

        /* Palette Area */
        .palette-section {
            flex: 1;
            min-width: 300px;
        }

        .color-info {
            background: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .color-info h3 { margin: 0 0 5px 0; font-size: 22px; }
        .color-info p { margin: 0; color: #6c757d; font-size: 14px; }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 12px;
            max-height: 550px; /* Membatasi tinggi grid agar sejajar dengan tinggi mockup */
            overflow-y: auto; /* Mengaktifkan scroll jika pilihan warna terlalu panjang */
            padding-right: 5px;
        }

        .color-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 5px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .color-item:hover {
            background: #f1f3f5;
        }

        .color-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #e9ecef;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s, border-color 0.2s;
            margin-bottom: 8px;
        }

        .color-item.active .color-circle {
            border: 3px solid #22293B;
            transform: scale(1.1);
        }

        .color-label { font-size: 11px; text-align: center; font-weight: 500; color: #333; }
        .color-code { font-size: 10px; color: #777; text-align: center; }

        /* Responsif untuk layar HP */
        @media (max-width: 768px) {
            .container {
                gap: 20px;
                padding: 15px;
            }
            .color-grid {
                max-height: none;
            }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="title-header">
        <h2>CVC Pique Hexagon</h2>
        <p>Polished Look, Lasting Comfort</p>
    </div>

    <div class="disclaimer-full">
        ⚠️ <strong>DISCLAIMER:</strong> Tampilan ini hanya simulasi ilustrasi. Warna pada monitor/HP bisa berbeda. Untuk akurasi presisi 100%, silakan cek fisik kain di workshop.
    </div>

    <div class="model-section">
        <div class="mockup-wrapper">
            <div class="layer layer-base"></div>
            <div class="layer layer-color" id="baju-color"></div>
            <div class="layer layer-texture"></div>
        </div>
    </div>

    <div class="palette-section">
        <div class="color-info">
            <h3 id="display-name">Burgundy</h3>
            <p id="display-cat">Kategori: T (Tua)</p>
        </div>
        <div class="color-grid" id="color-grid"></div>
    </div>
</div>

<script>
    // Data RGB presisi dari CVC Pique Hexagon
    const colors = [
        // --- Referensi Gambar 1 ---
        { name: "Burgundy", code: "T", desc: "Tua", hex: "#5C2032" },
        { name: "Maroon", code: "T", desc: "Tua", hex: "#4A1B22" },
        { name: "Ruby Red", code: "T", desc: "Tua", hex: "#991D26" },
        { name: "Merah Cabe", code: "T", desc: "Tua", hex: "#CC2229" },
        { name: "Fuchsia", code: "T", desc: "Tua", hex: "#BE2669" },
        
        { name: "Dusty Rose", code: "S", desc: "Sedang", hex: "#A37B7E" },
        { name: "Autumn Orange", code: "T", desc: "Tua", hex: "#8B4A2D" },
        { name: "Orange Bata", code: "T", desc: "Tua", hex: "#BA4A21" },
        { name: "Orange", code: "S", desc: "Sedang", hex: "#E36319" },
        { name: "Kuning Kenari", code: "S", desc: "Sedang", hex: "#EDC715" },
        
        { name: "Mustard T", code: "T", desc: "Tua", hex: "#C68A24" },
        { name: "Dark Mustard", code: "T", desc: "Tua", hex: "#946726" },
        { name: "Almond Brown", code: "S", desc: "Sedang", hex: "#9B795A" },
        { name: "Toffee", code: "T", desc: "Tua", hex: "#5D4033" },
        { name: "Coklat Kopi", code: "T", desc: "Tua", hex: "#332822" },
        
        { name: "Light Brown", code: "M", desc: "Muda", hex: "#B1A696" },
        { name: "Beige", code: "M", desc: "Muda", hex: "#D3CAAC" },
        { name: "Hijau TNI", code: "T", desc: "Tua", hex: "#26492C" },
        { name: "Mineral Green", code: "S", desc: "Sedang", hex: "#52746C" },
        { name: "Olive Green", code: "S", desc: "Sedang", hex: "#757B5A" },
        
        { name: "Seafoam Green", code: "M", desc: "Muda", hex: "#A2B7AC" },
        { name: "Hijau Pucuk", code: "S", desc: "Sedang", hex: "#79B944" },
        { name: "Hijau Fuji", code: "T", desc: "Tua", hex: "#18933E" },
        { name: "Hijau Botol", code: "T", desc: "Tua", hex: "#143522" },
        { name: "Tosca", code: "T", desc: "Tua", hex: "#276C63" },
        
        { name: "Mineral Blue Tua", code: "T", desc: "Tua", hex: "#3A5E6F" },
        { name: "Ocean Blue", code: "T", desc: "Tua", hex: "#294F7D" },
        { name: "Steel Blue Tua", code: "T", desc: "Tua", hex: "#3B658A" },
        { name: "Sky Blue", code: "M", desc: "Muda", hex: "#79A7D0" },
        { name: "Biru Muda", code: "M", desc: "Muda", hex: "#62A4D8" },

        // --- Referensi Gambar 2 ---
        { name: "Turkis Muda", code: "M", desc: "Muda", hex: "#3DC0E6" },
        { name: "Turkis", code: "T", desc: "Tua", hex: "#1C6FB2" },
        { name: "Benhur Special 2", code: "TS2", desc: "Tua Special 2", hex: "#2B43A6" },
        { name: "Navy", code: "T", desc: "Tua", hex: "#1A1D36" },
        { name: "Ungu Tua", code: "T", desc: "Tua", hex: "#3B1B47" },
        
        { name: "Lilac", code: "M", desc: "Muda", hex: "#BA84BA" },
        { name: "Hitam Reaktif Special", code: "TS", desc: "Tua Special", hex: "#1A1A1A" },
        { name: "Twotone Hitam", code: "T", desc: "Tua", hex: "#2A2A2A" },
        { name: "Abu Tua", code: "T", desc: "Tua", hex: "#4D4D4D" },
        { name: "Misty M71 Putih Bluish", code: "MS", desc: "Misty Sedang", hex: "#A8B0B8" },
        
        { name: "Misty M71B Putih Bluish", code: "MS", desc: "Misty Sedang", hex: "#939CA6" },
        { name: "Abu Muda", code: "M", desc: "Muda", hex: "#CCD0D5" },
        { name: "Putih Netral", code: "P", desc: "Putih", hex: "#FFFFFF" },
        { name: "Putih Bluish", code: "P", desc: "Putih", hex: "#EAF0F8" }
    ];

    const grid = document.getElementById('color-grid');
    const colorLayer = document.getElementById('baju-color');
    const displayName = document.getElementById('display-name');
    const displayCat = document.getElementById('display-cat');

    function applyColor(colorObj, btnElement) {
        // Ganti warna layer masking
        colorLayer.style.backgroundColor = colorObj.hex;
        
        // Update teks informasi
        displayName.textContent = colorObj.name;
        displayCat.textContent = `Kategori: ${colorObj.code} (${colorObj.desc})`;

        // Update UI status tombol aktif
        document.querySelectorAll('.color-item').forEach(el => el.classList.remove('active'));
        btnElement.classList.add('active');
    }

    // Render grid tombol pilihan warna
    colors.forEach((color, index) => {
        const item = document.createElement('div');
        item.className = `color-item ${index === 0 ? 'active' : ''}`;
        item.innerHTML = `
            <div class="color-circle" style="background-color: ${color.hex};"></div>
            <div class="color-label">${color.name}</div>
            <div class="color-code">(${color.code})</div>
        `;
        item.addEventListener('click', () => applyColor(color, item));
        grid.appendChild(item);
    });
</script>

</body>
</html>
