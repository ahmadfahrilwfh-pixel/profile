<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Model Realistis - Nagata Japan Drill</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* Disclaimer Area */
        .disclaimer-full {
            width: 100%;
            background-color: #fff3cd;
            color: #856404;
            border-left: 5px solid #ffeeba;
            padding: 15px;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        /* Mockup Area */
        .model-section {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Stacking Context untuk 3 Layer WebP */
        .mockup-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4; 
            background-color: #eaeaea;
            border-radius: 8px;
            overflow: hidden;
            position: sticky;
            top: 20px;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        .layer-base {
            background-image: url('model-base-kemeja.webp');
            z-index: 1;
        }

        .layer-color {
            z-index: 2;
            background-color: #3A4042;
            -webkit-mask-image: url('mask-kemeja.png');
            mask-image: url('mask-kemeja.png');
            -webkit-mask-size: cover;
            mask-size: cover;
            -webkit-mask-position: center;
            mask-position: center;
            transition: background-color 0.4s ease;
            mix-blend-mode: multiply; 
        }

        .layer-texture {
            background-image: url('texture-kemeja.webp');
            z-index: 3;
            -webkit-mask-image: url('mask-kemeja.png');
            mask-image: url('mask-kemeja.png');
            -webkit-mask-size: cover;
            mask-size: cover;
            -webkit-mask-position: center;
            mask-position: center;
            mix-blend-mode: multiply; 
            opacity: 0.5; 
            pointer-events: none; 
            background-repeat: repeat;
            background-size: 30px;
        }

        /* Palette Area */
        .palette-section {
            flex: 1.5;
            min-width: 350px;
        }

        .color-info {
            background: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            position: sticky;
            top: 20px;
            z-index: 10;
        }

        .color-info h3 { margin: 0 0 5px 0; font-size: 22px; }
        .color-info p { margin: 0; color: #6c757d; font-size: 14px; }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 8px;
            background: #fafafa;
        }

        /* Scrollbar custom untuk grid */
        .color-grid::-webkit-scrollbar {
            width: 8px;
        }
        .color-grid::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 8px;
        }
        .color-grid::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 8px;
        }
        .color-grid::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }

        .color-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 10px 5px;
            border-radius: 8px;
            transition: background-color 0.2s;
        }

        .color-item:hover {
            background-color: #ebebeb;
        }

        .color-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #e9ecef;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            margin-bottom: 8px;
        }

        .color-item.active {
            background-color: #e2e6ea;
        }

        .color-item.active .color-circle {
            border: 3px solid #000;
            transform: scale(1.15);
        }

        .color-label { font-size: 11px; text-align: center; font-weight: 500; line-height: 1.2; margin-bottom: 3px; }
        .color-code { font-size: 10px; color: #6c757d; text-align: center; font-weight: bold;}

    </style>
</head>

    const displayName = document.getElementById('display-name');
    const displayCat = document.getElementById('display-cat');

    function applyColor(colorObj, btnElement) {
        // Ganti warna layer masking
        colorLayer.style.backgroundColor = colorObj.hex;
        
        // Update teks
        displayName.textContent = colorObj.name;
        displayCat.textContent = `Kode: ${colorObj.code} (${colorObj.desc})`;

        // Update UI tombol aktif
        document.querySelectorAll('.color-item').forEach(el => el.classList.remove('active'));
        btnElement.classList.add('active');
    }

    // Render tombol
    colors.forEach((color, index) => {
        const item = document.createElement('div');
        item.className = `color-item ${index === 0 ? 'active' : ''}`;
        item.innerHTML = `
            <div class="color-circle" style="background-color: ${color.hex};"></div>
            <div class="color-label">${color.name}</div>
            <div class="color-code">${color.code}</div>
        `;
        item.addEventListener('click', () => applyColor(color, item));
        grid.appendChild(item);
    });
